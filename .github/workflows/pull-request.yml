name: Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
  # Determine which services need CI based on changed files
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      needs-install: ${{ steps.filter.outputs.needs-install }}
      any-code: ${{ steps.filter.outputs.any-code }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            needs-install:
              - "**/package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
            admin:
              - ".github/workflows/**"
              - "packages/@liexp/core/src/**"
              - "packages/@liexp/io/src/**"
              - "packages/@liexp/shared/src/**"
              - "packages/@liexp/ui/src/**"
              - "services/admin/**"
            agent:
              - ".github/workflows/**"
              - "packages/@liexp/core/src/**"
              - "packages/@liexp/io/src/**"
              - "packages/@liexp/shared/src/**"
              - "packages/@liexp/backend/src/**"
              - "services/agent/**"
            ai-bot:
              - ".github/workflows/**"
              - "packages/@liexp/core/src/**"
              - "packages/@liexp/io/src/**"
              - "packages/@liexp/shared/src/**"
              - "packages/@liexp/backend/src/**"
              - "services/ai-bot/**"
            api:
              - ".github/workflows/**"
              - "packages/@liexp/core/**"
              - "packages/@liexp/io/src/**"
              - "packages/@liexp/shared/**"
              - "packages/@liexp/backend/**"
              - "services/api/**"
            packages:
              - ".github/workflows/**"
              - "packages/**"
            storybook:
              - ".github/workflows/**"
              - "packages/@liexp/**/src/**"
              - "services/storybook/**"
            web:
              - ".github/workflows/**"
              - "packages/@liexp/core/src/**"
              - "packages/@liexp/io/src/**"
              - "packages/@liexp/shared/src/**"
              - "packages/@liexp/ui/src/**"
              - "services/web/**"
            worker:
              - ".github/workflows/**"
              - "packages/@liexp/core/src/**"
              - "packages/@liexp/io/src/**"
              - "packages/@liexp/shared/src/**"
              - "packages/@liexp/backend/src/**"
              - "services/worker/**"
            root:
              - ".github/workflows/**"
              - "knip.json"
              - "package.json"
              - "pnpm-lock.yaml"
            # Aggregate filters
            any-service:
              - "services/**"
            any-code:
              - "packages/**"
              - "services/**"
              - ".github/workflows/**"
              - "**/package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"

      - name: Build CI matrix
        id: set-matrix
        env:
          ADMIN: ${{ steps.filter.outputs.admin }}
          AGENT: ${{ steps.filter.outputs.agent }}
          AI_BOT: ${{ steps.filter.outputs.ai-bot }}
          API: ${{ steps.filter.outputs.api }}
          PACKAGES: ${{ steps.filter.outputs.packages }}
          STORYBOOK: ${{ steps.filter.outputs.storybook }}
          WEB: ${{ steps.filter.outputs.web }}
          WORKER: ${{ steps.filter.outputs.worker }}
          NEEDS_INSTALL: ${{ steps.filter.outputs.needs-install }}
        run: |
          # When lock files / root package.json change, all services must be checked
          if [[ "$NEEDS_INSTALL" == "true" ]]; then
            ADMIN=true AGENT=true AI_BOT=true API=true PACKAGES=true STORYBOOK=true WEB=true WORKER=true
          fi
          items=()
          [[ "$ADMIN" == "true" ]] && items+=(
            '{"service":"admin","lint_command":"pnpm admin lint","build_command":"pnpm admin build","app_command":"pnpm admin build:app","spec_command":"pnpm admin test"}'
          )
          [[ "$AGENT" == "true" ]] && items+=(
            '{"service":"agent","lint_command":"pnpm agent lint","build_command":"pnpm agent build","spec_command":"pnpm agent test"}'
          )
          [[ "$AI_BOT" == "true" ]] && items+=(
            '{"service":"ai-bot","lint_command":"pnpm ai-bot lint","build_command":"pnpm ai-bot build","spec_command":"pnpm ai-bot test"}'
          )
          [[ "$API" == "true" ]] && items+=(
            '{"service":"api","lint_command":"pnpm api lint","build_command":"pnpm api build","spec_command":"pnpm api test:spec","e2e_command":"pnpm api test:e2e","migration_command":"pnpm api migration:run","dotenv_path":"./.env.test","needs_db":true}'
          )
          [[ "$PACKAGES" == "true" ]] && items+=(
            '{"service":"packages","lint_command":"pnpm packages lint","spec_command":"pnpm packages test"}'
          )
          [[ "$STORYBOOK" == "true" ]] && items+=(
            '{"service":"storybook","lint_command":"pnpm storybook lint","build_command":"pnpm storybook typecheck","app_command":"pnpm storybook build:app","spec_command":"pnpm storybook test"}'
          )
          [[ "$WEB" == "true" ]] && items+=(
            '{"service":"web","lint_command":"pnpm web lint","build_command":"pnpm web build","app_command":"pnpm web build:app-server","spec_command":"pnpm web test"}'
          )
          [[ "$WORKER" == "true" ]] && items+=(
            '{"service":"worker","lint_command":"pnpm worker lint","build_command":"pnpm worker build","spec_command":"pnpm worker test","e2e_command":"pnpm worker test:e2e","dotenv_path":"./.env.test","needs_db":true}'
          )
          joined=$(IFS=,; echo "${items[*]}")
          echo "matrix={\"include\":[$joined]}" >> $GITHUB_OUTPUT

  # Install dependencies and build packages (shared cache for all jobs)
  install:
    needs: detect-changes
    if: needs.detect-changes.outputs.needs-install == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-deps
        with:
          hash: ${{ hashFiles('**/pnpm-lock.yaml') }}

      - uses: ./.github/actions/build-packages

  # CI job - lint, build, spec tests, and e2e tests (with conditional DB services)
  ci:
    needs: [detect-changes, install]
    if: |
      always() &&
      (needs.install.result == 'success' || needs.install.result == 'skipped') &&
      needs.detect-changes.outputs.any-code == 'true'
    runs-on: ubuntu-latest

    # Conditional services - only start when matrix.needs_db is true
    services:
      redis:
        image: ${{ matrix.needs_db && 'redis:7' || '' }}
        ports:
          - 6379:6379
      pg-db-test:
        image: ${{ matrix.needs_db && 'postgres:17' || '' }}
        env:
          POSTGRES_USER: liexp
          POSTGRES_PASSWORD: liexp-password
          POSTGRES_DB: liexp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 8432:5432

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    name: CI ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-workspace
        with:
          hash: ${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Lint ${{ matrix.service }}
        if: ${{ matrix.lint_command }}
        run: ${{ matrix.lint_command }}

      - name: Build ${{ matrix.service }}
        if: ${{ matrix.build_command }}
        uses: ./.github/actions/build-service
        with:
          service: ${{ matrix.service }}
          build_command: ${{ matrix.build_command }}

      - name: Build ${{ matrix.service }} app
        if: ${{ matrix.app_command }}
        env:
          DOTENV_CONFIG_PATH: "./.env"
        run: ${{ matrix.app_command }}

      - name: Test ${{ matrix.service }} (spec)
        if: ${{ matrix.spec_command }}
        uses: ./.github/actions/test-service
        with:
          service: ${{ matrix.service }}
          spec_command: ${{ matrix.spec_command }}
          dotenv_path: ${{ matrix.dotenv_path || '.env' }}

      - name: Run migrations
        if: ${{ matrix.migration_command }}
        env:
          DOTENV_CONFIG_PATH: ${{ matrix.dotenv_path || '.env' }}
        run: ${{ matrix.migration_command }}

      - name: Test ${{ matrix.service }} (e2e)
        if: ${{ matrix.e2e_command }}
        uses: ./.github/actions/test-service
        with:
          service: ${{ matrix.service }}
          e2e_command: ${{ matrix.e2e_command }}
          dotenv_path: ${{ matrix.dotenv_path || '.env' }}

  # Knip report (for any code changes)
  knip-report:
    needs: [detect-changes, install]
    if: |
      always() &&
      (needs.install.result == 'success' || needs.install.result == 'skipped') &&
      needs.detect-changes.outputs.any-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-workspace
        with:
          hash: ${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Post the knip results
        run: pnpm knip
