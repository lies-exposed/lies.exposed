---
version: 2
updates:
  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    target-branch: "main"

  # npm – single root entry so pnpm-lock.yaml covers all workspace packages.
  # Listing individual workspace directories alongside "/" causes Dependabot to
  # open one PR per directory for every shared dependency (e.g. react-dropzone
  # would get a PR for "/" AND "/packages/@liexp/ui"). Groups also only apply
  # within a single directory block, so keeping everything under "/" is required
  # for cross-workspace grouping (e.g. storybook, eslint) to work properly.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 15
    target-branch: "main"
    versioning-strategy: increase
    allow:
      - dependency-type: "direct"
    ignore:
      # Internal workspace packages – never updated by Dependabot
      - dependency-name: "@liexp/*"
      # Pinned external deps – not ready for these majors yet
      - dependency-name: "@types/mime"
        versions: ["2.x", "3.x", "4.x"]
      - dependency-name: "fast-check"
        versions: ["4.x"]
      - dependency-name: react
        versions: ["19.x"]
      - dependency-name: react-dom
        versions: ["19.x"]
      - dependency-name: typescript
        versions: ["6.x"]
      - dependency-name: "@types/node"
        versions: ["25.x"]
      - dependency-name: "@types/react"
        versions: ["19.x"]
      - dependency-name: "@types/react-dom"
        versions: ["19.x"]
      # MUI v9 dropped Box/Stack/Grid system-prop shorthands (display, width,
      # padding, alignItems, etc. as direct props) in favor of sx-only — a
      # breaking change that broke the @liexp/ui build across 100+ call
      # sites (see PR reverting #3710). Pin below v8 until that migration
      # is done deliberately.
      - dependency-name: "@mui/material"
        versions: ["8.x", "9.x"]
      - dependency-name: "@mui/system"
        versions: ["8.x", "9.x"]
      - dependency-name: "@mui/icons-material"
        versions: ["8.x", "9.x"]
      - dependency-name: "@mui/x-data-grid"
        versions: ["9.x"]
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
      blocknote:
        patterns:
          - "@blocknote/*"
      langchain:
        patterns:
          - "@langchain/*"
          - "langchain"
      mui:
        patterns:
          - "*mui*"
      react-admin:
        patterns:
          - "ra-*"
          - "react-admin"
      react-router:
        patterns:
          - "react-router*"
      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"
          - "eslint-plugin-storybook"
      dev-deps:
        patterns:
          - "@typescript-eslint/*"
          - "typescript-eslint*"
          - "@eslint/*"
          - "eslint*"
          - "eslint"
          - "@types/*"
          - "@vitejs/*"
          - "vite*"
          - "jest*"
          - "vitest*"
          - "typescript"
          - "tsup"
          - "esbuild*"
          - "@testing-library/*"
          - "testing-library*"
          - "msw"
          - "playwright"
          - "prettier"
          - "husky"
          - "lint-staged"
          - "nodemon"
      sentry:
        patterns:
          - "@sentry/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      visx:
        patterns:
          - "*visx*"
