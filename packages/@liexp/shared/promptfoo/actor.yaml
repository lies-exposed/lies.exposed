# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json

# Learn more about building a configuration: https://promptfoo.dev/docs/configuration/guide

description: "Actor configuration"

evaluateOptions:
  maxConcurrency: 1

sharing: false

prompts:
  # actor prompts
  - id: file://../lib/providers/openai/prompts/actor.prompts.js:EMBED_ACTOR_PROMPT
    label: EMBED_ACTOR_PROMPT
  # plain passthrough for agent tool-calling tests
  - id: "{{message}}"
    label: AGENT_QUERY
  # event prompts
  # - id: file://src/io/openai/prompts/event.prompts.ts:EMBED_EVENT_PROMPT
  #   label: EMBED_EVENT_PROMPT
  # - id: file://src/io/openai/prompts/event.prompts.ts:CREATE_EVENT_FROM_URL_PROMPT
  #   label: CREATE_EVENT_FROM_URL_PROMPT
  # - id: file://src/io/openai/prompts/event.prompts.ts:CREATE_EVENT_FROM_TEXT_PROMPT
  #   label: CREATE_EVENT_FROM_TEXT_PROMPT

providers:
  - id: xai:grok-4-fast
    config:
      apiKey: "{{env.XAI_API_KEY}}"
      temperature: 0
  - id: http
    label: agent-service
    config:
      url: https://agent.liexp.dev/v1/chat/message
      method: POST
      headers:
        Content-Type: application/json
        Authorization: "Bearer {{env.AGENT_API_TOKEN}}"
      body:
        message: "{{prompt}}"
        conversation_id: null
      transformResponse: "json.data.message.content"
  # - id: localai:salamandra-7b-instruct
  #   config:
  #     temperature: 0
  #     apiKey: no-key-is-a-good-key
  #     apiBaseUrl: http://0.0.0.0:8080

tests:
  - vars:
      text: Stanley Kubrick
      question: When and how did he died?
    # EMBED_ACTOR_PROMPT only — AGENT_QUERY has no 'text' for these
    providers:
      - xai:grok-4-fast
      - agent-service
    prompts:
      - EMBED_ACTOR_PROMPT
  - vars:
      text: David Rockefeller
      question: When and how did he died?
    providers:
      - xai:grok-4-fast
      - agent-service
    prompts:
      - EMBED_ACTOR_PROMPT
  - vars:
      text: David Irving
      question: Who was and what he was famous for?
    providers:
      - xai:grok-4-fast
      - agent-service
    prompts:
      - EMBED_ACTOR_PROMPT
  - vars:
      message: Find the latest 10 actors on the platform
    # Only agent-service has platform access; xAI alone cannot answer this
    providers:
      - agent-service
    prompts:
      - AGENT_QUERY
