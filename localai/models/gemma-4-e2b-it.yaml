backend: llama-cpp
context_size: 16384
# gpu_layers: 18
# f16: true
# mmap must be disabled for SYCL (Intel GPU) - causes hangs
# mmap: true
name: gemma-4-e2b-it
mmproj: mmproj-gemma-4-e2b-it-f16.gguf
known_usecases:
  - chat
options:
  - use_jinja:true
parameters:
  model: gemma-4-e2b-it-Q8_0.gguf
template:
  use_tokenizer_template: true
function:
  disable_no_action: false
  automatic_tool_parsing_fallback: true
  grammar:
    disable: true
  return_name_in_function_response: true
  json_regex_match:
    - "(?s)<tool_call>\\s*\\[?\\s*(\\{.*?\\})\\s*\\]?\\s*</tool_call>"
    - "(?s)<tool_call>\\s*\\[?\\s*(\\{.*?)\\s*\\]?\\s*$"
