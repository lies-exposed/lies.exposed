# digital ocean
do:
  token: my-do-token

domain: liexp.dev

admin:
  dev: false
  nginxConfPath: "/home/node/resources/nginx/admin.liex.dev"

api:
  dbHost: db.liexp.dev
  dbPort: 8432
  mcpToken: "api-mcp-token-placeholder"

worker:
  dbHost: db.liexp.dev
  dbPort: 8432
  generateThumbnails:
    enabled: true
    schedule: "0 2 * * *"  # Daily at 2 AM UTC
    limit: null  # Process all media without thumbnails (can be set to a number to limit)
    resources:
      limits:
        memory: "512Mi"
        cpu: "300m"
      requests:
        memory: "256Mi"
        cpu: "100m"
    manualJob:
      enabled: false  # Set to true to create a one-time Job for manual execution
      limit: null  # Optional limit for manual runs
      resources:
        limits:
          memory: "512Mi"
          cpu: "300m"
        requests:
          memory: "256Mi"
          cpu: "100m"
  upsertNLPEntities:
    enabled: true
    schedule: "0 1 * * *"  # Daily at 1 AM UTC
    resources:
      limits:
        memory: "512Mi"
        cpu: "300m"
      requests:
        memory: "256Mi"
        cpu: "100m"
    manualJob:
      enabled: false  # Set to true to create a one-time Job for manual execution
      resources:
        limits:
          memory: "512Mi"
          cpu: "300m"
        requests:
          memory: "256Mi"
          cpu: "100m"

aiBot:
  configPath: "/home/node/services/ai-bot/config"

agent:
  enabled: true

shared:
  tempVolumeHostPath: /home/node/lies-exposed-temp/

db:
  host: db.liexp.dev
  port: 8432
  dumpHostPath: /home/node/db/dump

redis:
  host: redis.liexp-dev.svc.cluster.local

space:
  host: space.liexp-dev.svc.cluster.local
  accessKeyId: "space-access-key-id"
  accessKeySecret: "space-access-key-secret-id"

telegram:
  nginxConfPath: /home/node/resources/nginx/
  nginxConfFile: telegram.conf
  api:
    hash: "not-real-hash"
    id: "not-real-id"

storybook:
  # Build is now synced to MinIO bucket 'storybook' by CI
  minioBucket: storybook
  nginxLogVolumePath: /home/node/storybook/logs

localai:
  modelsHostPath: /home/node/localai-models
  openAIApiKey: no-key-is-a-good-key

bugsink:
  enabled: true
  domain: "bugsink.liexp.dev"
  secretKey: "CHANGE_ME_generate_a_random_secret_key_at_least_50_chars"
  superuser: "admin:admin"
  email:
    host: ""  # SMTP server (e.g., smtp.gmail.com)
    port: "587"
    useTls: "true"
    hostUser: ""  # email address
    password: ""  # app password or SMTP password

imageCredentials:
  registry: ghcr.io
  username: your-username
  password: your-password
  email: your-email@example.com
