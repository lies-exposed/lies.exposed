apiVersion: apps/v1
kind: Deployment
metadata:
  name: localai
  namespace: {{ .Release.Namespace }}
{{ tuple . "localai" | include "localai.labels" | indent 2 }}
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      lies.exposed/name: localai
  template:
    metadata:
{{ tuple . "localai" | include "localai.labels" | indent 6 }}
    spec:
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
      containers:
        - name: localai
          envFrom:
          - configMapRef:
              name: localai-env
          image: localai/localai:v3.10.1-aio-gpu-intel
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          ports:
            - containerPort: 8080
              protocol: TCP
          tty: true
          volumeMounts:
            - name: localai-models-pv
              mountPath: /models
            # - name: localai-backends-pv
            #   mountPath: /backends
          resources:
            limits:
              memory: 5Gi
              cpu: 2000m
              gpu.intel.com/i915: 1
            requests:
              memory: 2Gi
              cpu: 500m
              gpu.intel.com/i915: 1
      restartPolicy: Always
      volumes:
        - name: localai-models-pv
          persistentVolumeClaim:
            claimName: localai-models-pv-claim
        # - name: localai-backends-pv
        #   persistentVolumeClaim:
        #     claimName: localai-backends-pv-claim
