apiVersion: v1
kind: ConfigMap
metadata:
  name: bugsink-env
{{ tuple . "bugsink-env" | include "bugsink.labels" | indent 2 }}
data:
  PORT: "8000"
  ALLOWED_HOSTS: "{{ .Values.bugsink.domain }}"
  BEHIND_HTTPS_PROXY: "true"
{{- if .Values.bugsink.email.host }}
  EMAIL_HOST: "{{ .Values.bugsink.email.host }}"
  EMAIL_PORT: "{{ .Values.bugsink.email.port }}"
  EMAIL_USE_TLS: "{{ .Values.bugsink.email.useTls }}"
  EMAIL_HOST_USER: "{{ .Values.bugsink.email.hostUser }}"
{{- end }}